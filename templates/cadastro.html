<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sistema de Biblioteca Online</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cadastro.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header com logo e título -->
        <header class="header">
            <div class="logo-container">
                <img src="{{ url_for('static', filename='img/library_icon.png') }}" alt="Ícone da Biblioteca" class="logo">
                <h1 class="title">Sistema de Biblioteca Online</h1>
            </div>
        </header>

        <!-- Conteúdo principal -->
        <main class="main-content">
            <!-- Banner lateral -->
            <div class="banner-section">
                <img src="{{ url_for('static', filename='img/reading_person.png') }}" alt="Pessoa lendo na biblioteca" class="banner-image">
                <div class="banner-text">
                    <h2>Bem-vindo à nossa biblioteca!</h2>
                    <p>Cadastre-se para acessar nosso acervo completo e descobrir um mundo de conhecimento.</p>
                </div>
            </div>

            <!-- Formulário de cadastro -->
            <div class="form-section">
                <div class="form-container">
                    <h2 class="form-title">Criar Conta</h2>
                    <p class="form-subtitle">Preencha os dados abaixo para se cadastrar</p>
                    
                    <form id="cadastroForm" class="cadastro-form">
                        <div class="form-group">
                            <label for="nome" class="form-label">Nome Completo <span class="required">*</span></label>
                            <input type="text" id="nome" name="nome" class="form-input" placeholder="Digite seu nome completo" required>
                            <div class="error-message" id="nome-error"></div>
                        </div>

                        <div class="form-group">
                            <label for="email" class="form-label">E-mail <span class="required">*</span></label>
                            <input type="email" id="email" name="email" class="form-input" placeholder="Digite seu e-mail" required>
                            <div class="error-message" id="email-error"></div>
                        </div>

                        <div class="form-group">
                            <label for="senha" class="form-label">Senha <span class="required">*</span></label>
                            <input type="password" id="senha" name="senha" class="form-input" placeholder="Digite sua senha" required>
                            <div class="error-message" id="senha-error"></div>
                        </div>

                        <div class="form-group">
                            <label for="telefone" class="form-label">Telefone <span class="required">*</span></label>
                            <input type="tel" id="telefone" name="telefone" class="form-input" placeholder="Digite seu telefone" required>
                            <div class="error-message" id="telefone-error"></div>
                        </div>

                        <div class="form-group">
                            <label for="cep" class="form-label">CEP <span class="required">*</span></label>
                            <input type="text" id="cep" name="cep" class="form-input" placeholder="Digite seu CEP" required maxlength="9">
                            <div class="error-message" id="cep-error"></div>
                        </div>

                        <div class="form-group">
                            <label for="numero" class="form-label">Número <span class="required">*</span></label>
                            <input type="text" id="numero" name="numero" class="form-input" placeholder="Número" required>
                            <div class="error-message" id="numero-error"></div>
                        </div>

                        <div class="form-group">
                            <label for="complemento" class="form-label">Complemento</label>
                            <input type="text" id="complemento" name="complemento" class="form-input" placeholder="Complemento (apto, bloco, etc.)">
                            <div class="error-message" id="complemento-error"></div>
                        </div>

                        <button type="submit" class="submit-btn">
                            <span class="btn-text">Criar Conta</span>
                            <div class="btn-loader" style="display: none;"></div>
                        </button>
                    </form>

                    <div class="form-footer">
                        <p>Já possui uma conta? <a href="/login" class="login-link">Faça login aqui</a></p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/cadastro.js') }}"></script>
</body>
</html>
